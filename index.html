<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Intelligence Brief</title>
<meta name="description" content="Google & Anthropic 最新AIインテリジェンス・ブリーフ">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efe8dc;
    --surface-1: #e6ddd0;
    --surface-2: #ddd4c6;
    --surface-3: #d4cab8;
    --border: rgba(150, 110, 55, 0.14);
    --border-hover: rgba(150, 110, 55, 0.24);

    --text: #2a2218;
    --text-sub: #55493c;
    --text-dim: #8a8278;
    --text-muted: #a8a098;

    --gold: #a07840;
    --gold-light: #c09858;
    --gold-dim: rgba(160, 120, 64, 0.08);
    --gold-glow: rgba(160, 120, 64, 0.12);
    --gold-gradient: linear-gradient(135deg, #906830, #a07840, #c09858, #a07840);

    --g-blue: #4a7bb5;
    --g-blue-dim: rgba(74, 123, 181, 0.08);

    --a-coral: #b87050;
    --a-coral-dim: rgba(184, 112, 80, 0.08);

    --red: #b85c5c;
    --red-dim: rgba(184, 92, 92, 0.06);
    --violet: #8a6eb0;
    --violet-dim: rgba(138, 110, 176, 0.08);
    --green: #6b9a78;
    --green-dim: rgba(107, 154, 120, 0.08);

    --radius-s: 8px;
    --radius-m: 14px;
    --radius-l: 20px;

    --glass-bg: rgba(250, 244, 232, 0.80);
    --glass-border: rgba(150, 110, 55, 0.12);
    --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(160, 120, 64, 0.06);
    --shadow-card-hover: 0 8px 24px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(160, 120, 64, 0.12);
    --transition: 0.30s cubic-bezier(.4,0,.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  ::selection {
    background: rgba(160, 120, 64, 0.15);
    color: var(--text);
  }

  /* ── Premium Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(160, 120, 64, 0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(160, 120, 64, 0.35); }

  /* ── Hero ── */
  .hero {
    position: relative;
    padding: 72px 32px 48px;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(235, 229, 217, 0.6) 0%, var(--bg) 100%);
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: -60% -40%;
    background:
      radial-gradient(ellipse 600px 400px at 35% 40%, rgba(74, 123, 181, 0.06), transparent),
      radial-gradient(ellipse 500px 350px at 65% 55%, rgba(184, 112, 80, 0.06), transparent);
    animation: drift 14s ease-in-out infinite alternate;
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160, 120, 64, 0.18), transparent);
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(20px, -10px) scale(1.08); }
  }

  .hero-inner { position: relative; z-index: 1; }

  .hero-brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .brand-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(160, 120, 64, 0.3);
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.15;
    margin-bottom: 8px;
    color: var(--text);
  }

  .hero h1 .g-text {
    background: linear-gradient(135deg, var(--g-blue), #7aa3d0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero h1 .amp {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 0.65em;
    -webkit-text-fill-color: var(--text-dim);
  }

  .hero h1 .a-text {
    background: linear-gradient(135deg, var(--a-coral), #d09878);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .hero-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .hero-meta .update-time {
    color: var(--text-sub);
    font-weight: 500;
  }

  /* ── Container ── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 100px;
  }

  /* ── Section ── */
  .section { margin-top: 44px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .section-icon {
    width: 32px; height: 32px;
    border-radius: var(--radius-s);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
  }

  .section-icon.g-blue { background: var(--g-blue-dim); }
  .section-icon.a-coral { background: var(--a-coral-dim); }
  .section-icon.violet { background: var(--violet-dim); }
  .section-icon svg { width: 16px; height: 16px; }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    flex: 1;
  }

  .section-count {
    font-family: Menlo, Monaco, monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--glass-bg);
  }

  /* ── Cards ── */
  .card-list { display: grid; gap: 12px; }

  .card {
    position: relative;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-m);
    padding: 22px 24px;
    transition: all var(--transition);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20px;
    right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160, 120, 64, 0.10), transparent);
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-card-hover);
  }

  .card-accent {
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 3px 0 0 3px;
  }

  .card-accent.g-blue { background: linear-gradient(180deg, var(--g-blue), rgba(74, 123, 181, 0.2)); }
  .card-accent.a-coral { background: linear-gradient(180deg, var(--a-coral), rgba(184, 112, 80, 0.2)); }
  .card-accent.red { background: linear-gradient(180deg, var(--red), rgba(184, 92, 92, 0.2)); }

  .card-tags {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1.6;
  }

  .tag-blue { background: var(--g-blue-dim); color: var(--g-blue); border: 1px solid rgba(74,123,181,0.1); }
  .tag-amber { background: var(--a-coral-dim); color: var(--a-coral); border: 1px solid rgba(184,112,80,0.1); }
  .tag-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(184,92,92,0.06); }
  .tag-violet { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(138,110,176,0.08); }

  .card-headline {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.5;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card-body {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.85;
  }

  .card-body strong {
    color: var(--text);
    font-weight: 600;
  }

  .card-insight {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-s);
    font-size: 12px;
    line-height: 1.75;
    color: var(--text-sub);
    backdrop-filter: blur(4px);
  }

  .card-insight.blue-insight {
    background: rgba(74, 123, 181, 0.04);
    border-left: 2px solid rgba(74, 123, 181, 0.25);
  }

  .card-insight.amber-insight {
    background: rgba(184, 112, 80, 0.04);
    border-left: 2px solid rgba(184, 112, 80, 0.25);
  }

  .card-insight.red-insight {
    background: rgba(184, 92, 92, 0.04);
    border-left: 2px solid rgba(184, 92, 92, 0.25);
  }

  .card-source {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-source a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }

  .card-source a:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    gap: 12px;
  }

  .translate-link {
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    text-decoration: none;
    padding: 3px 10px;
    border: 1px solid rgba(160, 120, 64, 0.15);
    border-radius: 20px;
    transition: all var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .translate-link:hover {
    background: var(--gold-dim);
    border-color: rgba(160, 120, 64, 0.30);
    box-shadow: 0 0 12px rgba(160, 120, 64, 0.08);
  }

  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 44px;
  }

  .stat {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-m);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow-card);
  }

  .stat-num {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 2px;
  }

  .stat-num.c-blue { color: var(--g-blue); }
  .stat-num.c-amber { color: var(--a-coral); }
  .stat-num.c-red { color: var(--red); }
  .stat-num.c-violet { color: var(--violet); }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Insight Box ── */
  .insight-box {
    margin-top: 44px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-l);
    padding: 24px 24px;
    box-shadow: var(--shadow-card);
  }

  .insight-box h3 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(160, 120, 64, 0.08);
    letter-spacing: 0.3px;
  }

  .insight-box h3 svg { width: 16px; height: 16px; }

  .insight-box ul { list-style: none; }

  .insight-box li {
    font-size: 13px;
    color: var(--text-sub);
    padding: 7px 0 7px 18px;
    position: relative;
    line-height: 1.75;
  }

  .insight-box li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
  }

  .insight-box li strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 44px 20px;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-top: 1px solid rgba(160, 120, 64, 0.06);
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--surface-2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .hero { padding: 52px 20px 36px; }
    .hero h1 { font-size: clamp(24px, 7vw, 36px); }
    .container { padding: 0 14px 80px; }
    .card { padding: 18px 16px; }
    .card-headline { font-size: 14px; }
    .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat { padding: 16px 12px; }
    .stat-num { font-size: 20px; }
    .insight-box { padding: 20px 18px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-brand">
      <span class="brand-dot"></span>
      AI Intelligence Brief
    </div>
    <h1>
      <span class="g-text">Google</span>
      <span class="amp">&</span>
      <span class="a-text">Anthropic</span>
    </h1>
    <p class="hero-sub">Latest AI Intelligence for SAT</p>
    <p class="hero-meta">
      <span class="update-time" id="updateTime">読み込み中...</span>
    </p>
  </div>
</div>

<div class="container">
  <div id="newsContent">
    <div class="loading">
      <div class="spinner"></div>
      <span>ニュースを読み込んでいます...</span>
    </div>
  </div>
</div>

<div class="footer">
  AI Intelligence Brief · curated for SAT
</div>

<script>
// ── SVG Icons (inline, elegant) ──
const ICONS = {
  google: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 2v12M2 8h12"/></svg>`,
  anthropic: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2L14 14H2Z"/></svg>`,
  upcoming: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M2 7h12M6 1v4M10 1v4"/></svg>`,
  insight: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg>`,
  breaking: `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="8,1 10,6 15,6 11,9.5 12.5,14.5 8,11.5 3.5,14.5 5,9.5 1,6 6,6"/></svg>`
};

// ── Default data (static fallback) ──
const STATIC_NEWS = {
  lastUpdated: "2026-03-14T16:20:00+09:00",
  google: [
    {
      tags: [{ label: "Gemini", type: "blue" }, { label: "New", type: "red" }],
      headline: "Gemini 2.5 Flash Image — 画像生成AIの新時代",
      body: "<strong>Gemini 2.5 Flash</strong>に画像生成機能が統合。テキスト・画像両方を同時に生成可能な次世代マルチモーダルAI。",
      source: { name: "Google Blog", url: "https://blog.google" }
    }
  ],
  anthropic: [
    {
      tags: [{ label: "Claude", type: "amber" }, { label: "New", type: "red" }],
      headline: "Claude Code — マルチエージェント協調が本格化",
      body: "<strong>Claude Code</strong>でAgent Teams機能が搭載。複数のAIエージェントが並列でコーディングタスクを処理。",
      source: { name: "Anthropic", url: "https://anthropic.com" }
    }
  ],
  upcoming: [],
  stats: [
    { value: "—", label: "Google記事数", color: "c-blue" },
    { value: "—", label: "Anthropic記事数", color: "c-amber" },
    { value: "—", label: "最終更新", color: "c-violet" },
    { value: "—", label: "取得日", color: "c-red" }
  ],
  insights: []
};

// ── Render Functions ──
function renderSection(title, iconKey, iconClass, countLabel, items, accentClass) {
  if (!items || items.length === 0) return '';

  const cardsHtml = items.map(item => {
    const tags = item.tags.map(t => `<span class="tag tag-${t.type}">${t.label}</span>`).join('');
    const insight = item.insight
      ? `<div class="card-insight ${item.insightType || 'blue'}-insight">${item.insight}</div>`
      : '';
    const source = item.source
      ? `<div class="card-source">Source: <a href="${item.source.url}" target="_blank" rel="noopener">${item.source.name}</a></div>`
      : '';
    const translate = item.translate_url
      ? `<a href="${item.translate_url}" target="_blank" rel="noopener" class="translate-link">🇯🇵 日本語で読む</a>`
      : '';

    return `
      <div class="card">
        <div class="card-accent ${accentClass}"></div>
        <div class="card-tags">${tags}</div>
        <div class="card-headline">${item.headline}</div>
        <div class="card-body">${item.body}</div>
        ${insight}
        <div class="card-footer">
          ${source}
          ${translate}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="section">
      <div class="section-label">
        <div class="section-icon ${iconClass}">
          ${ICONS[iconKey]}
        </div>
        <span class="section-title">${title}</span>
        <span class="section-count">${countLabel}</span>
      </div>
      <div class="card-list">${cardsHtml}</div>
    </div>`;
}

function renderStats(stats) {
  const cells = stats.map(s => `
    <div class="stat">
      <div class="stat-num ${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  return `<div class="stats-row">${cells}</div>`;
}

function renderInsights(items) {
  if (!items || items.length === 0) return '';
  const lis = items.map(i => `<li>${i}</li>`).join('');
  return `
    <div class="insight-box">
      <h3>${ICONS.insight} SAT向けインサイト</h3>
      <ul>${lis}</ul>
    </div>`;
}

function formatDate(isoString) {
  const d = new Date(isoString);
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const hours = String(d.getHours()).padStart(2, '0');
  const mins = String(d.getMinutes()).padStart(2, '0');
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  return `${year}年${month}月${day}日（${weekdays[d.getDay()]}）${hours}:${mins} 更新`;
}

function render(data) {
  document.getElementById('updateTime').textContent = formatDate(data.lastUpdated);

  const content = document.getElementById('newsContent');
  let html = '';
  html += renderSection('Google / Gemini', 'google', 'g-blue', `${data.google.length} stories`, data.google, 'g-blue');
  html += renderSection('Anthropic / Claude', 'anthropic', 'a-coral', `${data.anthropic.length} stories`, data.anthropic, 'a-coral');
  if (data.upcoming && data.upcoming.length > 0) {
    html += renderSection('Coming Up', 'upcoming', 'violet', `${data.upcoming.length} events`, data.upcoming, 'g-blue');
  }
  html += renderStats(data.stats);
  html += renderInsights(data.insights);
  content.innerHTML = html;
}

// ── Data Loading ──
async function loadNews() {
  try {
    const res = await fetch('data/news.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      render(data);
      return;
    }
  } catch (e) {
    // fallback to static
  }
  render(STATIC_NEWS);
}

loadNews();

// ── PWA Registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
