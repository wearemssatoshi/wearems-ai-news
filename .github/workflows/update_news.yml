name: Update AI News

on:
  schedule:
    # JST 12:00 = UTC 03:00
    - cron: '0 3 * * *'
    # JST 20:00 = UTC 11:00
    - cron: '0 11 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch News
        run: python scripts/fetch_news.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "📰 Update news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
